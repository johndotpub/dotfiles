name: Build release tarball

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release asset basename
        id: asset
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          while [[ "$REPO_NAME" == .* ]]; do
            REPO_NAME="${REPO_NAME#.}"
          done
          if [[ -z "$REPO_NAME" ]]; then
            REPO_NAME="repo"
          fi
          echo "asset_basename=${REPO_NAME}-${GITHUB_REF_NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          OWNER_LC="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_LC="$(printf '%s' "${REPO_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=ghcr.io/${OWNER_LC}/${REPO_LC}" >> "$GITHUB_OUTPUT"

      - name: Set script permissions
        run: chmod +x install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh test/*.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Run release validation tests
        run: |
          bash -n install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh test/*.sh test/lib/*.sh
          shellcheck -x install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh test/*.sh test/lib/*.sh
          ./install.sh --help >/dev/null
          ./bootstrap.sh --help >/dev/null
          RELEASE_TAG="${GITHUB_REF_NAME}" bats test/installer.bats

      - name: Create tarball + checksum
        run: |
          ASSET_BASENAME="${{ steps.asset.outputs.asset_basename }}"
          mkdir -p dist
          # Use `gzip -n` so gzip headers do not inject variable timestamps/names.
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --exclude='.git' \
            --exclude='./dist' \
            -cf - \
            . | gzip -n > "dist/${ASSET_BASENAME}"
          (
            cd dist
            sha256sum "${ASSET_BASENAME}" > "${ASSET_BASENAME}.sha256"
          )

      - name: Sign checksum (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ASSET_BASENAME="${{ steps.asset.outputs.asset_basename }}"
          if [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --output "dist/${ASSET_BASENAME}.sha256.asc" \
              --detach-sign "dist/${ASSET_BASENAME}.sha256"
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.asc

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package image context
        run: |
          ASSET_BASENAME="${{ steps.asset.outputs.asset_basename }}"
          mkdir -p dist/package-image
          cp "dist/${ASSET_BASENAME}" "dist/package-image/"
          cp "dist/${ASSET_BASENAME}.sha256" "dist/package-image/"
          cat > "dist/package-image/Dockerfile" <<EOF
          FROM scratch
          ARG ASSET_BASENAME
          LABEL org.opencontainers.image.title=".skel release artifact"
          LABEL org.opencontainers.image.description="Deterministic release tarball and checksum for .skel"
          LABEL org.opencontainers.image.source="https://github.com/${GITHUB_REPOSITORY}"
          LABEL org.opencontainers.image.version="${GITHUB_REF_NAME}"
          LABEL org.opencontainers.image.licenses="Unlicense"
          ADD \${ASSET_BASENAME} /\${ASSET_BASENAME}
          ADD \${ASSET_BASENAME}.sha256 /\${ASSET_BASENAME}.sha256
          EOF

      - name: Publish GHCR package
        uses: docker/build-push-action@v6
        with:
          context: dist/package-image
          file: dist/package-image/Dockerfile
          push: true
          build-args: |
            ASSET_BASENAME=${{ steps.asset.outputs.asset_basename }}
          tags: |
            ${{ steps.asset.outputs.image_ref }}:${{ github.ref_name }}
            ${{ steps.asset.outputs.image_ref }}:latest
