name: Build release tarball

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh test/*.sh

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Run release validation tests
        run: |
          bash -n install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh test/*.sh test/lib/*.sh
          shellcheck -x install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh test/*.sh test/lib/*.sh
          ./test/check-no-root-config-duplicates.sh
          ./install.sh --help >/dev/null
          ./bootstrap.sh --help >/dev/null
          ./test/test-installer-idempotency.sh
          ./test/test-backup-collision.sh
          ./test/test-skel-merge-behavior.sh
          ./test/test-oh-my-tmux.sh
          ./test/test-install-lock.sh
          ./test/test-report-json.sh
          bats test/installer.bats
          ./test/verify-release-reproducible.sh "${GITHUB_REF_NAME}"

      - name: Create tarball + checksum
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          mkdir -p dist
          # Use `gzip -n` so gzip headers do not inject variable timestamps/names.
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --exclude='.git' \
            --exclude='./dist' \
            -cf - \
            . | gzip -n > "dist/${REPO_NAME}-${TAG}.tar.gz"
          (
            cd dist
            sha256sum "${REPO_NAME}-${TAG}.tar.gz" > "${REPO_NAME}-${TAG}.tar.gz.sha256"
          )

      - name: Sign checksum (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [ -n "${GPG_PRIVATE_KEY:-}" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            gpg --batch --yes --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" \
              --output "dist/${REPO_NAME}-${TAG}.tar.gz.sha256.asc" \
              --detach-sign "dist/${REPO_NAME}-${TAG}.tar.gz.sha256"
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/*.asc
