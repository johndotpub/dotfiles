name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set script permissions
        run: chmod +x install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install shellcheck (macOS)
        if: runner.os == 'macOS'
        run: brew install shellcheck

      - name: Shell syntax checks
        run: bash -n install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh

      - name: Shellcheck lint
        run: shellcheck -x install.sh bootstrap.sh scripts/*.sh scripts/lib/*.sh

      - name: Help smoke tests
        run: |
          ./install.sh --help >/dev/null
          ./bootstrap.sh --help >/dev/null

      - name: Dry-run smoke test
        run: ./install.sh --dry-run --no-apt --brew-only --yes --verbose >/dev/null

      - name: Idempotency test
        run: ./scripts/test-installer-idempotency.sh
